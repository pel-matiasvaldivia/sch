services:
  # ─────────────────── DATABASE ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hema_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────── CACHE / BROKER ───────────────────
  redis:
    image: redis:7-alpine
    container_name: hema_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── SEARCH ───────────────────
  elasticsearch:
    image: elasticsearch:8.12.1
    container_name: hema_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
      - cluster.name=hematologia-cluster
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────── FILE STORAGE ───────────────────
  minio:
    image: minio/minio:latest
    container_name: hema_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - backend-net
    ports:
      - "9001:9001"  # MinIO console (dev only)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── BACKEND ───────────────────
  backend:
    image: hema-backend:local
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: hema_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────── ASYNC WORKER ───────────────────
  worker:
    image: hema-worker:local
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: hema_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend:/app
    networks:
      - backend-net
    depends_on:
      - redis
      - postgres
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4

  # ─────────────────── CELERY MONITOR (dev) ───────────────────
  flower:
    image: hema-flower:local
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: hema_flower
    restart: unless-stopped
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./backend:/app
    networks:
      - backend-net
    depends_on:
      - redis
      - worker
    command: celery -A app.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"

  # ─────────────────── FRONTEND ───────────────────
  frontend:
    image: hema-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: hema_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - backend

  # ─────────────────── REVERSE PROXY ───────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: hema_nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - backend-net
      - frontend-net
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
