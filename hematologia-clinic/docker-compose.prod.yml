services:
  # ─────────────────── DATABASE ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hema_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────── CACHE / BROKER ───────────────────
  redis:
    image: redis:7-alpine
    container_name: hema_redis
    restart: always
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── SEARCH ───────────────────
  elasticsearch:
    image: elasticsearch:8.12.1
    container_name: hema_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
      - cluster.name=hematologia-cluster
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────── FILE STORAGE ───────────────────
  minio:
    image: minio/minio:latest
    container_name: hema_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── BACKEND ───────────────────
  backend:
    image: ${DOCKER_REGISTRY:-ghcr.io/pel-matiasvaldivia/sch}/hema-backend:latest
    container_name: hema_backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MINIO_ENDPOINT: minio:9000
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────── ASYNC WORKER ───────────────────
  worker:
    image: ${DOCKER_REGISTRY:-ghcr.io/pel-matiasvaldivia/sch}/hema-backend:latest
    container_name: hema_worker
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
    networks:
      - backend-net
    depends_on:
      - redis
      - postgres
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4

  # ─────────────────── FRONTEND ───────────────────
  frontend:
    image: ${DOCKER_REGISTRY:-ghcr.io/pel-matiasvaldivia/sch}/hema-frontend:latest
    container_name: hema_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - backend

  # ─────────────────── REVERSE PROXY ───────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: hema_nginx
    restart: always
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot_www:/var/www/certbot:ro
    ports:
      - "8881:80"
      - "4443:443"
    networks:
      - backend-net
      - frontend-net
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
